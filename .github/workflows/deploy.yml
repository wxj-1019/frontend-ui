name: Build & Deploy

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          driver: docker-container
          install: true

      - name: Build Docker image
        run: |
          docker buildx build \
            --platform linux/amd64 \
            --progress=plain \
            --tag frontend-ui-docs:latest \
            --load \
            .

      - name: Save Docker image
        run: |
          docker save frontend-ui-docs:latest | gzip > frontend-ui-docs.tar.gz
          ls -lh frontend-ui-docs.tar.gz

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H ${{ secrets.SERVER_HOST }} >> ~/.ssh/known_hosts

      - name: Upload & Deploy
        run: |
          echo "📤 Uploading image to server..."
          scp -i ~/.ssh/id_rsa -o StrictHostKeyChecking=no frontend-ui-docs.tar.gz ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }}:/root/frontend-ui-docs.tar.gz
          
          echo "🚀 Deploying on server..."
          ssh -i ~/.ssh/id_rsa -o StrictHostKeyChecking=no ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }} << 'EOF'
            set -e
            echo "Loading Docker image..."
            docker load < /root/frontend-ui-docs.tar.gz
            
            echo "Stopping old container..."
            docker rm -f frontend-ui-docs 2>/dev/null || true
            
            echo "Starting new container..."
            docker run -d \
              --name frontend-ui-docs \
              --restart unless-stopped \
              -p 80:3000 \
              frontend-ui-docs:latest
            
            echo "Cleaning up..."
            rm -f /root/frontend-ui-docs.tar.gz
            docker system prune -f --volumes 2>/dev/null || true
            
            echo "✅ Deployment complete!"
          EOF

      - name: Health Check
        run: |
          sleep 5
          ssh -i ~/.ssh/id_rsa -o StrictHostKeyChecking=no ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }} "
            echo 'Container status:' && docker ps --filter name=frontend-ui-docs --format '{{.Names}} {{.Status}} {{.Ports}}' &&
            echo 'HTTP status:' && curl -s -o /dev/null -w '%{http_code}' http://localhost:80
          "
